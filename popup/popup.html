<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Downloader</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- ===== HOME SCREEN ===== -->
  <div class="screen" id="screen-home">
    <div class="header-bar">
      <img src="images/play.png" alt="logo" width="22" height="22">
      <span class="brand">YT Downloader</span>
      <button id="btn-close-popup" class="btn-close-popup" title="Close">
        <i class="fas fa-times"></i>
      </button>

    </div>

    <div class="url-section">
      <div class="url-row">
        <input type="text" id="url-input" placeholder="Paste YouTube URL here..." autocomplete="off" spellcheck="false">
        <button id="btn-detect" title="Auto-detect from active tab">
          <i class="fas fa-crosshairs"></i>
        </button>
      </div>
      <button id="btn-fetch" class="btn-primary">
        <i class="fas fa-search"></i> Get Formats
      </button>
    </div>

    <div id="status-msg" class="status-msg hidden"></div>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Fetching formats…</span>
    </div>

    <!-- Formats Panel -->
    <div id="formats-panel" class="formats-panel hidden">
      <div class="tabs">
        <button class="tab-btn active" id="tab-video" data-tab="video">
          <i class="fas fa-film"></i> Video
        </button>
        <button class="tab-btn" id="tab-audio" data-tab="audio">
          <i class="fas fa-music"></i> Audio
        </button>
      </div>

      <div class="tab-content" id="content-video">
        <div class="formats-list" id="video-formats-list"></div>
      </div>

      <div class="tab-content hidden" id="content-audio">
        <div class="formats-list" id="audio-formats-list"></div>
      </div>
    </div>

    <!-- Download Progress -->
    <div id="download-bar" class="download-bar hidden">
      <i class="fas fa-download"></i>
      <span id="download-label">Downloading…</span>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="popup.js"></script>
</body>

</html>
